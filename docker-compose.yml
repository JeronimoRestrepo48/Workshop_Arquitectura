services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root12345
      MYSQL_DATABASE: tienda
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  web_django:
    build: .
    command: gunicorn --bind 0.0.0.0:8000 --workers 3 Tienda.wsgi:application
    depends_on:
      - db
    volumes:
      - .:/app
    environment:
      - DATABASE_HOST=db
      - DATABASE_NAME=tienda
      - DATABASE_USER=root
      - DATABASE_PASSWORD=root12345

  pagos_flask:
    build: ./microservicio_pagos
    ports:
      - "5000:5000"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web_django
      - pagos_flask
volumes:
  db_data:
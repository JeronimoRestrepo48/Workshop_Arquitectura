version: '3.8'
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root12345
      MYSQL_DATABASE: tienda
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - .:/app
    environment:
      - DATABASE_HOST=db
      - DATABASE_NAME=tienda
      - DATABASE_USER=root
      - DATABASE_PASSWORD=root12345

volumes:
  db_data: